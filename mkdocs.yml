# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: Odys
repo_url: https://github.com/ramirocrc/odys
site_url: https://ramirocrc.github.io/odys
site_description: Python framework for optimizing multi-energy systems
site_author: Ramiro Criach
edit_uri: edit/main/docs/
repo_name: ramirocrc/odys
copyright: Maintained by <a href="https://ramirocrc.com">ramirocrc</a>.

nav:
  - Home: index.md
  - User Guide:
      - Mathematical notation: user_guide/mathematical_notation.md
      - Models:
          - Generator: user_guide/generator.md
          - Storage: user_guide/storage.md
          - Load: user_guide/load.md
          - Market: user_guide/market.md
          - AssetPortfolio: user_guide/asset_portfolio.md
          - Scenario: user_guide/scenario.md
          - StochasticScenario: user_guide/stochastic_scenario.md
          - EnergySystem: user_guide/energy_system.md
      - Optimization: user_guide/optimization.md
      - Stochastic Optimization: user_guide/stochastic.md
      - Multi-stage Optimization: user_guide/multi_stage.md
  - Examples:
      - Overview: examples/index.md
      - Basic Dispatch: examples/basic_dispatch.md
      - Battery Dispatch: examples/battery_dispatch.md
      - Market Arbitrage: examples/market_arbitrage.md
      - CVaR Market Risk: examples/cvar_market_risk.md
  - API Reference:
      - Overview: api/index.md
      - odys: api/odys.md
      - energy_system: api/energy_system.md
      - domain:
          - Overview: api/domain/index.md
          - entities:
              - Overview: api/domain/entities/index.md
              - base: api/domain/entities/base.md
              - generator: api/domain/entities/generator.md
              - load: api/domain/entities/load.md
              - market: api/domain/entities/market.md
              - portfolio: api/domain/entities/portfolio.md
              - storage: api/domain/entities/storage.md
          - exceptions: api/domain/exceptions.md
          - objective: api/domain/objective.md
          - scenarios: api/domain/scenarios.md
          - validation: api/domain/validation.md
      - results:
          - Overview: api/results/index.md
          - dispatch: api/results/dispatch.md
          - optimization_results: api/results/optimization_results.md
      - optimization:
          - Overview: api/optimization/index.md
          - constraints:
              - Overview: api/optimization/constraints/index.md
              - constraints_group: api/optimization/constraints/constraints_group.md
              - cvar_constraints: api/optimization/constraints/cvar_constraints.md
              - generator_constraints: api/optimization/constraints/generator_constraints.md
              - market_constraints: api/optimization/constraints/market_constraints.md
              - model_constraint: api/optimization/constraints/model_constraint.md
              - scenario_constraints: api/optimization/constraints/scenario_constraints.md
              - storage_constraints: api/optimization/constraints/storage_constraints.md
          - model:
              - Overview: api/optimization/model/index.md
              - linopy_converter: api/optimization/model/linopy_converter.md
              - milp_model: api/optimization/model/milp_model.md
              - model_builder: api/optimization/model/model_builder.md
              - objectives: api/optimization/model/objectives.md
              - registry: api/optimization/model/registry.md
              - sets: api/optimization/model/sets.md
              - variables: api/optimization/model/variables.md
          - parameters:
              - Overview: api/optimization/parameters/index.md
              - generator_parameters: api/optimization/parameters/generator_parameters.md
              - load_parameters: api/optimization/parameters/load_parameters.md
              - market_parameters: api/optimization/parameters/market_parameters.md
              - parameters: api/optimization/parameters/parameters.md
              - scenario_parameters: api/optimization/parameters/scenario_parameters.md
              - storage_parameters: api/optimization/parameters/storage_parameters.md
      - solvers:
          - Overview: api/solvers/index.md
          - config_translators: api/solvers/config_translators.md
          - solver: api/solvers/solver.md
          - solver_config: api/solvers/solver_config.md
      - utils:
          - Overview: api/utils/index.md
          - logging: api/utils/logging.md

theme:
  name: material
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: blue
      accent: deep purple

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep purple
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ramirocrc/odys
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/odys

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/odys"]
  - plotly
  - exclude:
      glob:
        - __pycache__/*
markdown_extensions:
  - tables
  - toc:
      permalink: true
      title: Page contents
  - admonition
  - pymdownx.arithmatex:
      generic: true

  # Python Markdown Extensions
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: plotly
          class: mkdocs-plotly
          format: !!python/name:mkdocs_plotly_plugin.fences.fence_plotly
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
