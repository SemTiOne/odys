<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" style="max-width:800px; display:block; margin:0 auto; font-family:Roboto, 'Helvetica Neue', sans-serif;">
  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
  </defs>

  <!-- Timeline arrow -->
  <line x1="50" y1="130" x2="750" y2="130" stroke="#000000" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- NOW marker -->
  <line x1="80" y1="40" x2="80" y2="160" stroke="#000000" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="56" y="25" width="48" height="24" rx="5" fill="#000000"/>
  <text x="80" y="42" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">NOW</text>

  <!-- SDAC gate closure -->
  <line x1="200" y1="80" x2="200" y2="130" stroke="#0072B2" stroke-width="3"/>
  <text x="200" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#0072B2">SDAC gate closure</text>
  <text x="200" y="150" text-anchor="middle" font-size="11" fill="#0072B2">D-1 12:00</text>

  <!-- SIDC opens -->
  <line x1="350" y1="80" x2="350" y2="130" stroke="#E69F00" stroke-width="3"/>
  <text x="350" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#E69F00">SIDC opens</text>
  <text x="350" y="150" text-anchor="middle" font-size="11" fill="#E69F00">D-1 13:00</text>

  <!-- SIDC availability region -->
  <rect x="350" y="80" width="350" height="50" fill="#E69F00" opacity="0.15"/>
  <line x1="350" y1="80" x2="700" y2="80" stroke="#E69F00" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="350" y1="130" x2="700" y2="130" stroke="#E69F00" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="525" y="110" text-anchor="middle" font-size="11" fill="#E69F00" font-style="italic">continuous intraday trading</text>

  <!-- Delivery period -->
  <line x1="720" y1="80" x2="720" y2="130" stroke="#009E73" stroke-width="3"/>
  <text x="720" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#009E73">Delivery</text>
  <text x="720" y="150" text-anchor="middle" font-size="11" fill="#009E73">D 00:00</text>
</svg>
